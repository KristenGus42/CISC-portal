<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Form</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center py-5">
  <div class="container">

        <h1 class="fs-4 fw-bold mb-1">Contact Us</h1>
        <p class="subtitle small mb-4">Fill out the form below and we'll get back to you shortly.</p>

        <div class="row mb-3">
            <div class="col-2 pe-2">
                <label for="first-name" class="form-label fw-semibold small">Age</label>
                <input type="text" class="form-control" id="first-name">
            </div>
            <div class="col-2 ps-2">
                <label for="last-name" class="form-label fw-semibold small">Sex</label>
                <input type="text" class="form-control" id="last-name">
            </div>
            <div class="col-2 pe-2">
                <label for="first-name" class="form-label fw-semibold small">Household Size</label>
                <input type="text" class="form-control" id="first-name">
            </div>
            <div class="col-5 ps-2">
                <label for="last-name" class="form-label fw-semibold small">Income Level</label>
                <input type="text" class="form-control" id="last-name">
            </div>
            <div class="col-5 ps-2">
                <label for="last-name" class="form-label fw-semibold small">Address</label>
                <input type="text" class="form-control" id="last-name">
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-2 pe-2">
                <label for="first-name" class="form-label fw-semibold small">City</label>
                <input type="text" class="form-control" id="first-name">
            </div>
            <div class="col-2 ps-2">
                <label for="last-name" class="form-label fw-semibold small">Zip</label>
                <input type="text" class="form-control" id="last-name">
            </div>
            <div class="col-2 pe-2">
                <label for="first-name" class="form-label fw-semibold small">Primary Language</label>
                <input type="text" class="form-control" id="first-name">
            </div>
            <div class="col-5 ps-2">
                <label for="last-name" class="form-label fw-semibold small">Secondary Language</label>
                <input type="text" class="form-control" id="last-name">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-2 pe-2">
                <label for="first-name" class="form-label fw-semibold small">Category</label>
                <input type="text" class="form-control" id="first-name">
            </div>
            <div class="col-2 ps-2">
                <label for="last-name" class="form-label fw-semibold small">Legal Documents?</label>
                <input type="text" class="form-control" id="last-name">
            </div>

        </div>
        <div class="row">
          <div class="col-12">
            <button type="button" class="btn btn-submit btn-primary w-100 py-2">Send Message</button>
          </div>
        </div>
  </div>
</body>
</html>
